{% extends 'base/base.html' %}
{% load static %}

{% block title %}خطأ في الخادم - 500{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="mb-4">
                <i class="fas fa-times-circle text-danger" style="font-size: 5rem;"></i>
            </div>
            <h1 class="display-1 fw-bold text-muted">500</h1>
            <h2 class="mb-3">خطأ في الخادم</h2>
            <p class="text-muted mb-4">
                عذراً، حدث خطأ غير متوقع في الخادم. يرجى المحاولة مرة أخرى لاحقاً.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">
                    <i class="fas fa-home me-1"></i>
                    الرئيسية
                </a>
                <button onclick="location.reload()" class="btn btn-outline-secondary">
                    <i class="fas fa-sync-alt me-1"></i>
                    إعادة تحميل
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
