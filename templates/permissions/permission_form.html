{% extends 'base/base.html' %}

{% block title %}إصدار إذن جديد - نظام إدارة المعاهد{% endblock %}

{% block content %}
<div class="permission-form-page">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">إصدار إذن جديد</h4>
        <a href="{% url 'permissions:permission_list' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-right me-2"></i>رجوع
        </a>
    </div>
    
    <div class="content-card">
        <div class="content-card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">العميل <span class="text-danger">*</span></label>
                    <select name="client" class="form-select" required>
                        <option value="">اختر العميل</option>
                        {% for client in clients %}
                        <option value="{{ client.pk }}" {% if request.GET.client == client.pk|stringformat:"s" %}selected{% endif %}>{{ client.full_name }} - {{ client.national_id }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">الدبلومة</label>
                        <select name="diploma" class="form-select" id="diploma_select">
                            <option value="">-</option>
                            {% for diploma in diplomas %}
                            <option value="{{ diploma.pk }}">{{ diploma.name }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">اختر الدبلومة أو الدورة</small>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">الدورة</label>
                        <select name="course" class="form-select" id="course_select">
                            <option value="">-</option>
                            {% for course in courses %}
                            <option value="{{ course.pk }}">{{ course.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">تاريخ الانتهاء</label>
                    <input type="date" name="expiry_date" class="form-control">
                    <small class="text-muted">اتركه فارغاً لاستخدام تاريخ انتهاء البرنامج</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">ملاحظات</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-file-pdf me-2"></i>إصدار الإذن
                    </button>
                    <a href="{% url 'permissions:permission_list' %}" class="btn btn-outline-secondary">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
// التأكد من اختيار دبلومة أو دورة فقط
document.getElementById('diploma_select').addEventListener('change', function() {
    if (this.value) {
        document.getElementById('course_select').value = '';
    }
});

document.getElementById('course_select').addEventListener('change', function() {
    if (this.value) {
        document.getElementById('diploma_select').value = '';
    }
});
</script>
{% endblock %}
{% endblock %}
