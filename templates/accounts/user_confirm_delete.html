{% extends 'base/base.html' %}

{% block title %}حذف مستخدم - نظام إدارة المعاهد{% endblock %}

{% block content %}
<div class="user-delete-page">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="content-card">
                <div class="content-card-body text-center py-5">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                    </div>
                    <h4 class="mb-3">تأكيد الحذف</h4>
                    <p class="text-muted mb-4">
                        هل أنت متأكد من حذف المستخدم <strong>{{ object.get_full_name|default:object.username }}</strong>؟<br>
                        <span class="text-danger">لا يمكن التراجع عن هذا الإجراء!</span>
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-2"></i>نعم، حذف
                            </button>
                            <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-2"></i>إلغاء
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
