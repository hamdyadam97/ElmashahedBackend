{% extends 'base/base.html' %}

{% block title %}تم تغيير كلمة المرور - نظام إدارة المعاهد{% endblock %}

{% block login_content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-check-circle" style="color: var(--success-color);"></i>
        </div>
        <h1 class="login-title">تم التعيين بنجاح</h1>
        
        <div class="alert alert-success">
            <i class="fas fa-check me-2"></i>
            تم تغيير كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول باستخدام كلمة المرور الجديدة.
        </div>
        
        <div class="text-center mt-4">
            <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-3">
                <i class="fas fa-sign-in-alt me-2"></i> تسجيل الدخول الآن
            </a>
        </div>
        
        <div class="text-center mt-4 text-muted">
            <small>جميع الحقوق محفوظة &copy; {% now "Y" %}</small>
        </div>
    </div>
</div>
{% endblock %}
