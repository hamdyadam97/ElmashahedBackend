{% extends 'base/base.html' %}

{% block title %}تسجيل الدخول - نظام إدارة المعاهد{% endblock %}

{% block login_content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="login-title">نظام إدارة المعاهد التعليمية</h1>
        
        {% if form.errors %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i>
            اسم المستخدم أو كلمة المرور غير صحيحة
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            
            <div class="mb-4">
                <label class="form-label">اسم المستخدم</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-user text-muted"></i>
                    </span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="أدخل اسم المستخدم" required autofocus>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">كلمة المرور</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-lock text-muted"></i>
                    </span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="أدخل كلمة المرور" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-3">
                <i class="fas fa-sign-in-alt me-2"></i>
                تسجيل الدخول
            </button>
        </form>
        
        <div class="text-center mt-4 text-muted">
            <small>جميع الحقوق محفوظة &copy; {% now "Y" %}</small>
        </div>
    </div>
</div>
{% endblock %}
