{% extends 'base/base.html' %}

{% block title %}{% if object %}تعديل دبلومة{% else %}إضافة دبلومة{% endif %} - نظام إدارة البرامج{% endblock %}

{% block content %}
<div class="diploma-form-page">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">{% if object %}تعديل دبلومة{% else %}إضافة دبلومة جديدة{% endif %}</h4>
        <a href="{% url 'programs:diploma_list' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-right me-2"></i>رجوع
        </a>
    </div>

    <div class="content-card">
        <div class="content-card-body">
            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">المعهد التابع له <span class="text-danger">*</span></label>
                        <select name="institute" class="form-select" required>
                            <option value="">إختر المعهد...</option>
                            {% for inst in form.fields.institute.queryset %}
                                <option value="{{ inst.id }}" {% if object.institute_id == inst.id or form.institute.value|add:"0" == inst.id %}selected{% endif %}>
                                    {{ inst.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">اسم الدبلومة <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" value="{{ object.name|default:'' }}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">الكود <span class="text-danger">*</span></label>
                        <input type="text" name="code" class="form-control" value="{{ object.code|default:'' }}" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">الفئة (Category)</label>
                        <select name="category" class="form-select">
                            <option value="">---------</option>
                            {% for cat in form.fields.category.queryset %}
                                <option value="{{ cat.id }}" {% if object.category_id == cat.id or form.category.value|add:"0" == cat.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">الحالة</label>
                        <select name="status" class="form-select">
                            {% for value, label in form.fields.status.choices %}
                                <option value="{{ value }}" {% if object.status == value or form.status.value == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">مدة الدراسة (بالشهور) <span class="text-danger">*</span></label>
                        <input type="number" name="duration_months" class="form-control" value="{{ object.duration_months|default:'24' }}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">الرسوم الدراسية <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" name="fees" class="form-control" value="{{ object.fees|default:'0.00' }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">وصف الدبلومة</label>
                    <textarea name="description" class="form-control" rows="3">{{ object.description|default:'' }}</textarea>
                </div>

                <hr class="my-4">
                <h6 class="mb-3 text-primary"><i class="fas fa-calendar-alt me-2"></i>المواعيد والجدول الزمني</h6>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">تاريخ البداية <span class="text-danger">*</span></label>
                        <input type="date" name="start_date" class="form-control" value="{{ object.start_date|date:'Y-m-d' }}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">تاريخ النهاية <span class="text-danger">*</span></label>
                        <input type="date" name="end_date" class="form-control" value="{{ object.end_date|date:'Y-m-d' }}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">بداية فترة التسجيل <span class="text-danger">*</span></label>
                        <input type="date" name="registration_start_date" class="form-control" value="{{ object.registration_start_date|date:'Y-m-d' }}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">نهاية فترة التسجيل <span class="text-danger">*</span></label>
                        <input type="date" name="registration_end_date" class="form-control" value="{{ object.registration_end_date|date:'Y-m-d' }}" required>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>{% if object %}حفظ التغييرات{% else %}إضافة الدبلومة{% endif %}
                    </button>
                    <a href="{% url 'programs:diploma_list' %}" class="btn btn-outline-secondary">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
